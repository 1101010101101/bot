name: Run script
on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

# env:
#   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Run script
        run: |
          OUTPUT=$(python script.py)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "You've already requested trial access"; then
            echo "Код уже получен — пропускаем"
            exit 0
          fi
          echo "Новый результат получен!"

      - name: Trigger next run
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/run.yml/dispatches \
            -d '{"ref":"main"}'
