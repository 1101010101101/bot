name: Build mc-overlay

on:
  push:
    paths:
      - 'mc-overlay/src/**'
      - 'mc-overlay/.github/workflows/**'
  pull_request:
    paths:
      - 'mc-overlay/src/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSVC to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Compile
        working-directory: mc-overlay/src
        run: |
          cl main.cpp overlay.cpp memory.cpp render.cpp `
            /link d3d11.lib dxgi.lib d3dcompiler.lib user32.lib gdi32.lib Psapi.lib `
            /out:..\overlay.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: overlay-x64
          path: mc-overlay/overlay.exe
          retention-days: 7
